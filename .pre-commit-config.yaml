# Hooks run the uv-managed tools (same versions as `make check` and uv.lock),
# so pre-commit and the CI gate never diverge.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        require_serial: true
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
      - id: bandit
        name: bandit
        entry: uv run bandit -c pyproject.toml -r src
        language: system
        pass_filenames: false
        require_serial: true
